name: Publish Release on Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build, package and publish release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Install dependencies
        run: npm ci

      - name: Build and package
        run: npm run build:pkg

      - name: Create archives and checksums
        run: |
          set -e
          mkdir -p release
          if [ -d patterns ]; then cp -r patterns release/ || true; fi
          tar -czf release/ariscode-release.tar.gz -C release . || true
          (cd release && zip -r ariscode-release.zip .) || true
          sha256sum release/* > release/checksums.txt || true
          ls -la release

      - name: Create GitHub release and upload assets
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: release/*
